<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">
<h:head>
    <title>Dashboard – Like Hero To Zero</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f0;
        }
        .header {
            background-color: #2e7d32;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { margin: 0; }
        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background-color: white;
            padding: 28px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 24px;
        }
        .card h2 {
            margin-top: 0;
            color: #2e7d32;
        }
        .form-row {
            margin-bottom: 16px;
        }
        .form-row label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .form-row input[type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="submit"] {
            padding: 10px 24px;
            font-size: 16px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #4caf50;
        }
        .logout-btn input[type="submit"] {
            background-color: #c62828;
        }
        .logout-btn input[type="submit"]:hover {
            background-color: #e53935;
        }
        .message {
            margin-top: 12px;
            color: #2e7d32;
            font-weight: bold;
        }
        .no-access {
            text-align: center;
            padding: 40px;
        }
    </style>
</h:head>
<h:body>
    <div class="header">
        <h1>🌍 Like Hero To Zero</h1>
        <span>Willkommen, #{loginController.username}!</span>
    </div>

    <div class="container">
        <h:panelGroup rendered="#{!loginController.loggedIn}">
            <div class="card no-access">
                <h2>Kein Zugriff!</h2>
                <p>Bitte erst einloggen.</p>
                <h:link value="Zum Login" outcome="login" />
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{loginController.loggedIn}">
            <div class="card">
                <h2>Neue CO2 Emission eintragen</h2>
                <h:form>
                    <div class="form-row">
                        <h:outputLabel for="countryCode" value="Ländercode (z.B. DEU)" />
                        <h:inputText id="countryCode" 
                                     value="#{co2Controller.selectedCountryCodeForNew}" />
                    </div>
                    <div class="form-row">
                        <h:outputLabel for="year" value="Jahr" />
                        <h:inputText id="year" value="#{co2Controller.newEmission.year}" />
                    </div>
                    <div class="form-row">
                        <h:outputLabel for="emission" value="CO2 Ausstoß in kt" />
                        <h:inputText id="emission" 
                                     value="#{co2Controller.newEmission.emissionKt}" />
                    </div>
                    <h:commandButton value="Speichern" action="#{co2Controller.save}" />
                    <div class="message">
                        <h:outputText value="#{co2Controller.message}" 
                                      rendered="#{not empty co2Controller.message}" />
                    </div>
                </h:form>
            </div>

            <div class="card logout-btn">
                <h:form>
                    <h:commandButton value="Ausloggen" action="#{loginController.logout}" />
                </h:form>
            </div>
        </h:panelGroup>
    </div>
</h:body>
</html>
